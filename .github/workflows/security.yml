name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

jobs:
  # ============================================
  # SAST - Static Application Security Testing
  # ============================================
  sast-semgrep:
    name: Semgrep SAST Analysis
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --json --output=semgrep-results.json \
            . || true
      
      - name: Upload Semgrep Results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json

  sast-codeql:
    name: CodeQL SAST Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ============================================
  # SCA - Software Composition Analysis
  # ============================================
  sca-npm-audit:
    name: NPM Audit (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate || true
      
      - name: Generate npm audit report
        run: npm audit --json > npm-audit-results.json || true
      
      - name: Upload npm audit results
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: npm-audit-results.json

  # ============================================
  # Secret Scanning
  # ============================================
  secret-scanning:
    name: Gitleaks - Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITLEAKS_license: ${{ secrets.GITLEAKS_LICENSE }}

  # ============================================
  # Dependency Checking
  # ============================================
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'devsecops-lab'
          path: '.'
          format: 'JSON'
          continue-on-error: false
      
      - name: Upload Dependency-Check results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-results
          path: reports/

  # ============================================
  # Container Image Scanning
  # ============================================
  container-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t devsecops-app:latest .
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-app:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Upload Trivy results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  # ============================================
  # Build & Test
  # ============================================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [sca-npm-audit]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check for hardcoded secrets
        run: |
          if grep -r "sk_live\|mongodb://\|STRIPE\|API_KEY" server.js 2>/dev/null; then
            echo "❌ FAILED: Possible hardcoded secrets detected!"
            exit 1
          fi
          echo "✅ No hardcoded secrets found in code"

  # ============================================
  # Security Gate (Fail if critical vulns)
  # ============================================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sast-codeql, sca-npm-audit, container-scan]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Analyze results
        run: |
          echo "🔍 Security Scan Summary"
          echo "========================"
          
          # Check npm audit
          if [ -f npm-audit-results/npm-audit-results.json ]; then
            echo "✅ NPM Audit completed"
            CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' npm-audit-results/npm-audit-results.json 2>/dev/null || echo 0)
            if [ "$CRITICAL" -gt 0 ]; then
              echo "⚠️  Found $CRITICAL critical vulnerabilities"
            fi
          fi
          
          echo ""
          echo "📊 All scans executed. Check the artifacts for detailed reports."
          echo "📝 Review security findings before merging to main."

  # ============================================
  # Report Generation
  # ============================================
  generate-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [security-gate]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all scan results
        uses: actions/download-artifact@v4
      
      - name: Create security report
        run: |
          mkdir -p reports
          
          echo "# 🔒 DevSecOps Security Report" > reports/SECURITY_REPORT.md
          echo "" >> reports/SECURITY_REPORT.md
          echo "**Date:** $(date)" >> reports/SECURITY_REPORT.md
          echo "**Commit:** ${{ github.sha }}" >> reports/SECURITY_REPORT.md
          echo "" >> reports/SECURITY_REPORT.md
          
          echo "## Scan Results" >> reports/SECURITY_REPORT.md
          echo "" >> reports/SECURITY_REPORT.md
          echo "- ✅ Semgrep SAST" >> reports/SECURITY_REPORT.md
          echo "- ✅ CodeQL SAST" >> reports/SECURITY_REPORT.md
          echo "- ✅ NPM Audit (SCA)" >> reports/SECURITY_REPORT.md
          echo "- ✅ Gitleaks Secret Scanning" >> reports/SECURITY_REPORT.md
          echo "- ✅ Dependency-Check" >> reports/SECURITY_REPORT.md
          echo "- ✅ Trivy Container Scan" >> reports/SECURITY_REPORT.md
          echo "" >> reports/SECURITY_REPORT.md
          
          echo "## Recommendations" >> reports/SECURITY_REPORT.md
          echo "" >> reports/SECURITY_REPORT.md
          echo "1. Review critical findings in the GitHub Security tab" >> reports/SECURITY_REPORT.md
          echo "2. Keep dependencies up to date" >> reports/SECURITY_REPORT.md
          echo "3. Use secrets management (GitHub Secrets)" >> reports/SECURITY_REPORT.md
          echo "4. Scan code before every commit" >> reports/SECURITY_REPORT.md
      
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/
      
      - name: Print summary
        run: |
          echo "📊 Security Pipeline Complete!"
          echo "👉 Check the Artifacts section for detailed reports"
          echo "👉 Check the Security tab for scan results"
